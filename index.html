/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pop{0%{transform:scale(0.8);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}

/* Pull to refresh */
#ptr-container{position:relative;overflow:visible}
#ptr-indicator{
  position:absolute;top:-60px;left:50%;transform:translateX(-50%);
  width:40px;height:40px;border-radius:50%;
  background:#faf9f7;border:1.5px solid #cac8c3;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s,transform .3s;z-index:100;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
}
#ptr-indicator.visible{opacity:1}
#ptr-indicator.refreshing .ptr-spinner{animation:spin .7s linear infinite}

<script type="text/babel">
const{useState,useEffect,useCallback,useRef}=React;

/* ─── Pull to Refresh ─── */
function usePullToRefresh(){
  const [pulling,setPulling]=useState(false);
  const [pullDist,setPullDist]=useState(0);
  const [refreshing,setRefreshing]=useState(false);
  const [lastRefresh,setLastRefresh]=useState(null);
  const startY=useRef(0);
  const currentY=useRef(0);
  const isPulling=useRef(false);
  const threshold=80;

  useEffect(()=>{
    function onTouchStart(e){
      if(window.scrollY>5)return;
      startY.current=e.touches[0].clientY;
      isPulling.current=true;
    }
    function onTouchMove(e){
      if(!isPulling.current||window.scrollY>5)return;
      currentY.current=e.touches[0].clientY;
      const dist=Math.max(0,currentY.current-startY.current);
      if(dist>10){
        e.preventDefault();
        const dampened=Math.min(dist*0.5,120);
        setPullDist(dampened);
        setPulling(true);
      }
    }
    function onTouchEnd(){
      if(!isPulling.current)return;
      isPulling.current=false;
      if(pullDist>=threshold*0.5){
        setRefreshing(true);
        setPullDist(50);
        setTimeout(()=>{
          window.location.reload();
        },600);
      }else{
        setPulling(false);
        setPullDist(0);
      }
    }
    document.addEventListener("touchstart",onTouchStart,{passive:true});
    document.addEventListener("touchmove",onTouchMove,{passive:false});
    document.addEventListener("touchend",onTouchEnd,{passive:true});
    return()=>{
      document.removeEventListener("touchstart",onTouchStart);
      document.removeEventListener("touchmove",onTouchMove);
      document.removeEventListener("touchend",onTouchEnd);
    };
  },[pullDist]);

  return{pulling,pullDist,refreshing,threshold};
}

const SUBJECTS=[
  {keys:["math","science","inheritance","traits","organisms"],label:"Math & Science",emoji:"🔬",gradient:"linear-gradient(135deg,#e8ece9 0%,#d5ddd8 100%)",border:"#8fa89a",accent:"#3d6b4f",tag:"SCI"},
  {keys:["spanish","español"],label:"Spanish",emoji:"🇪🇸",gradient:"linear-gradient(135deg,#f0ebe0 0%,#e5dccb 100%)",border:"#c4a86a",accent:"#8b6914",tag:"SPA"},
  {keys:["ela","reading","english","writing","grammar","vocabulary"],label:"ELA / Reading",emoji:"📖",gradient:"linear-gradient(135deg,#e6eaf0 0%,#d3dae5 100%)",border:"#8a9bb5",accent:"#4a6185",tag:"ELA"},
  {keys:["social","history","geography","civics","economy","market","goods"],label:"Social Studies",emoji:"🌍",gradient:"linear-gradient(135deg,#ece8f0 0%,#ddd6e5 100%)",border:"#a08db8",accent:"#5e4d75",tag:"SOC"},
];
const getSub=t=>{const l=(t||"").toLowerCase();for(const s of SUBJECTS)if(s.keys.some(k=>l.includes(k)))return s;return{label:"General",emoji:"📝",gradient:"linear-gradient(135deg,#e8e7e3,#dddcd8)",border:"#b0aea8",accent:"#6b6960",tag:"GEN"}};

/* ─── Helpers ─── */
const daysTo=d=>{if(!d)return null;const t=new Date(d+"T00:00:00"),n=new Date();n.setHours(0,0,0,0);return Math.ceil((t-n)/864e5)};
const fDate=d=>d?new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}):"TBD";
const urgC=d=>d===null?"#a0a0a0":d<=2?"#a63d3d":d<=5?"#b8860b":"#3d7a4f";
const shuf=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]]}return b};

const DEFAULTS=[
  {id:"t1",subject:"Math & Science",topic:"Inheritance & Traits",date:"2026-04-01",notes:"Study inherited vs learned traits, dominant/recessive",studyGuide:[]},
  {id:"t2",subject:"Social Studies",topic:"Markets & Economy (Lesson 9)",date:"2026-04-02",notes:"Vocab: economy, free market economy, services, goods, scarcity, market",studyGuide:[
    {term:"Market",def:"A place where people buy and sell things"},
    {term:"Competition",def:"You can compete with other sellers by lowering your prices"},
    {term:"Economy",def:"When you buy or sell something, you are part of the economy. It can be big or small"},
    {term:"Goods",def:"Items that can be bought, sold, or traded (toys, food, clothing) — things you can see or touch"},
    {term:"Services",def:"Tasks you pay someone to do for you (hair dresser, lawn care, house cleaning, face painting)"},
    {term:"Free Market Economy",def:"Where the choices are left to the buyer and the seller"},
    {term:"Scarcity",def:"Farmers cannot grow as much as the customer wants — limited to what their crop can produce each year"},
  ]},
];

/* ─── Components ─── */
const Pill=({children,color,style})=><span style={{display:"inline-flex",alignItems:"center",padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:700,letterSpacing:0.5,background:color+"18",color,border:"1px solid "+color+"30",...style}}>{children}</span>;
const Badge=({days})=>{if(days===null||days<0)return null;const c=urgC(days);return<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minWidth:52,height:52,borderRadius:12,background:c+"14",border:"1.5px solid "+c+"35"}}><span style={{fontSize:22,fontWeight:800,lineHeight:1,color:c}}>{days}</span><span style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:1.5,color:c,opacity:0.8,marginTop:1}}>{days===0?"today":days===1?"tmrw":"days"}</span></div>};
const BackBtn=({onClick,label})=><button onClick={onClick} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 0",marginBottom:16,color:"var(--text-2)",fontSize:14,fontWeight:600}}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>{label||"Back"}</button>;
const Spinner=({size=18,color="var(--blue)"})=><span style={{display:"inline-block",width:size,height:size,border:`2.5px solid ${color}30`,borderTopColor:color,borderRadius:"50%",animation:"spin .7s linear infinite"}}/>;

const Confetti=()=>{const colors=["#b8860b","#c4a86a","#3d6b4f","#4a6185","#5e4d75","#d4af37"];return<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,pointerEvents:"none",zIndex:999,overflow:"hidden"}}>{Array.from({length:40}).map((_,i)=><div key={i} style={{position:"absolute",top:"-10px",left:Math.random()*100+"%",width:8+Math.random()*6,height:8+Math.random()*6,borderRadius:Math.random()>0.5?"50%":"2px",background:colors[i%colors.length],animation:`confetti-fall ${1+Math.random()*1.5}s ease-in ${Math.random()*0.5}s forwards`,opacity:0.9}}/>)}</div>};

function App(){
  const[tests,setTests]=useState([]);
  const[plan,setPlan]=useState(null);
  const[view,setView]=useState("home");
  const[sel,setSel]=useState(null);
  const[activeId,setActiveId]=useState(null);
  const[email,setEmail]=useState("");
  const[extracting,setExtracting]=useState(false);
  const[planLoading,setPlanLoading]=useState(false);
  const[form,setForm]=useState({subject:"",topic:"",date:"",notes:""});
  const[nt,setNt]=useState("");const[nd,setNd]=useState("");
  const[ei,setEi]=useState(null);const[et,setEt]=useState("");const[ed,setEd]=useState("");
  const[qt,setQt]=useState(null);const[qd,setQd]=useState(null);const[qi,setQi]=useState(0);
  const[sc,setSc]=useState(0);const[ans,setAns]=useState(false);const[ua,setUa]=useState(null);
  const[fi,setFi]=useState("");const[ms,setMs]=useState({});const[msub,setMsub]=useState(false);
  const[wrongPicks,setWrongPicks]=useState([]);const[gotItRight,setGotItRight]=useState(false);
  const[fillWrong,setFillWrong]=useState(false);
  const[matchCorrect,setMatchCorrect]=useState({});const[matchWrong,setMatchWrong]=useState({});
  const[showHelp,setShowHelp]=useState(false);
  const[showConfetti,setShowConfetti]=useState(false);
  const[detailTab,setDetailTab]=useState("guide");
  const fiRef=useRef(null);

  useEffect(()=>{
    const saved=load(SK,null);
    if(saved&&saved.length){
      const merged=DEFAULTS.map(dt=>{const ex=saved.find(s=>s.id===dt.id);return ex?{...dt,...ex,studyGuide:(ex.studyGuide?.length)?ex.studyGuide:dt.studyGuide}:dt});
      saved.forEach(s=>{if(!merged.find(m=>m.id===s.id))merged.push(s)});
      setTests(merged);
    }else{setTests(DEFAULTS);persist(SK,DEFAULTS)}
    setPlan(load(PK,null));
  },[]);

  const save=useCallback(u=>{setTests(u);persist(SK,u)},[]);
  const addTest=()=>{if(!form.topic.trim())return;save([...tests,{...form,id:Date.now()+"",studyGuide:[]}].sort((a,b)=>(a.date||"z").localeCompare(b.date||"z")));setForm({subject:"",topic:"",date:"",notes:""});go("home")};
  const delTest=id=>{save(tests.filter(t=>t.id!==id));setSel(null)};
  const go=(v,id)=>{setView(v);if(id)setActiveId(id)};

  // Study guide
  const addG=()=>{if(!nt.trim()||!nd.trim())return;save(tests.map(t=>t.id!==activeId?t:{...t,studyGuide:[...(t.studyGuide||[]),{term:nt.trim(),def:nd.trim()}]}));setNt("");setNd("")};
  const updG=i=>{if(!et.trim()||!ed.trim())return;save(tests.map(t=>t.id!==activeId?t:{...t,studyGuide:(t.studyGuide||[]).map((x,j)=>j===i?{term:et.trim(),def:ed.trim()}:x)}));setEi(null)};
  const delG=i=>save(tests.map(t=>t.id!==activeId?t:{...t,studyGuide:(t.studyGuide||[]).filter((_,j)=>j!==i)}));

  // Extract
  const extract=async()=>{
    if(email.trim().length<20)return;setExtracting(true);
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:"Extract test/quiz info from this school content for a 3rd grader. Today: "+new Date().toISOString().split("T")[0]+", year 2026.\n\n"+email.slice(0,3000)+"\n\nONLY JSON array, no markdown.\n[{\"subject\":\"Social Studies\",\"topic\":\"Topic\",\"date\":\"2026-04-05\",\"notes\":\"Notes\",\"studyGuide\":[{\"term\":\"Word\",\"def\":\"Def\"}]}]\nIf no tests: []"}]})});
      if(!r.ok)throw new Error("API "+r.status);
      const d=await r.json();const txt=(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").replace(/```json|```/g,"").trim();
      const p=JSON.parse(txt);
      if(Array.isArray(p)&&p.length){save([...tests,...p.filter(t=>t?.topic).map(t=>({...t,id:Date.now()+"-"+Math.random().toString(36).slice(2,6),studyGuide:t.studyGuide||[]}))].sort((a,b)=>(a.date||"z").localeCompare(b.date||"z")));setEmail("");go("home")}
      else alert("No tests found in that content.");
    }catch(e){alert("Error: "+e.message)}setExtracting(false)};

  // Plan
  const genPlan=async()=>{
    const up=tests.filter(t=>daysTo(t.date)>=0);if(!up.length)return;setPlanLoading(true);
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:"Study plan for Omar, 3rd grader at Cedar Hill Prep. Today: "+new Date().toISOString().split("T")[0]+".\nTests: "+JSON.stringify(up)+"\nRules: 15-20 min sessions, age-appropriate (flashcards, drawing, sorting, verbal quizzes w/ parents, practice), stagger back-to-back tests, no weekends unless test is Monday.\nONLY JSON, no markdown.\n[{\"day\":\"YYYY-MM-DD\",\"dayLabel\":\"Mon, Apr 1\",\"tasks\":[{\"subject\":\"Math & Science\",\"activity\":\"Draw traits chart\",\"duration\":\"15 min\"}]}]"}]})});
      if(!r.ok)throw new Error("API "+r.status);
      const d=await r.json();const txt=(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").replace(/```json|```/g,"").trim();
      const pl=JSON.parse(txt);const pa=Array.isArray(pl)?pl:[pl];setPlan(pa);persist(PK,pa);
    }catch(e){alert("Error: "+e.message)}setPlanLoading(false)};

  // Quiz
  const startQ=(id,type)=>{
    const t=tests.find(x=>x.id===id);if(!t?.studyGuide||t.studyGuide.length<2)return;
    setActiveId(id);setQt(type);setQi(0);setSc(0);setAns(false);setUa(null);setFi("");setMs({});setMsub(false);setShowConfetti(false);setWrongPicks([]);setGotItRight(false);setFillWrong(false);setMatchCorrect({});setMatchWrong({});
    const sg=t.studyGuide;
    if(type==="mc")setQd(shuf(sg).map(it=>({term:it.term,opts:shuf([{t:it.def,c:true},...shuf(sg.filter(x=>x.term!==it.term)).slice(0,3).map(w=>({t:w.def,c:false}))])})));
    else if(type==="tf"){const qs=[];sg.forEach(it=>{qs.push({term:it.term,shown:it.def,c:true});const w=shuf(sg.filter(x=>x.term!==it.term))[0];if(w)qs.push({term:it.term,shown:w.def,c:false})});setQd(shuf(qs).slice(0,Math.min(10,sg.length*2)))}
    else if(type==="fill")setQd(shuf(sg).map(it=>({term:it.term,def:it.def})));
    else if(type==="match"){const items=shuf(sg).slice(0,Math.min(5,sg.length));setQd({terms:items.map(i=>i.term),defs:shuf(items.map(i=>i.def)),correct:items})}
    go("quiz")};

  const chkFill=()=>{if(!qd?.[qi])return;const a=fi.trim().toLowerCase(),c=qd[qi].term.toLowerCase();const ok=c.includes(a)||a.includes(c)||(a.length>2&&c.split(" ").some(w=>w.toLowerCase()===a));if(ok){setAns(true);setGotItRight(true);setFillWrong(false);if(wrongPicks.length===0)setSc(s=>s+1)}else{setFillWrong(true);setWrongPicks(wp=>[...wp,"x"]);setFi("")}};
  const nxtQ=()=>{setQi(i=>i+1);setAns(false);setUa(null);setFi("");setWrongPicks([]);setGotItRight(false);setFillWrong(false);setTimeout(()=>fiRef.current?.focus(),100)};
  const lockInMatch=(term,def,wasRevealed)=>{
    setMatchCorrect(mc=>{const n={...mc,[term]:def};
      const newCount=Object.keys(n).length;
      if(qd&&newCount>=qd.terms.length){
        // Check if high score for confetti
        const firstTryCount=wasRevealed||matchWrong[term]?sc:sc+1;
        if(firstTryCount>=qd.terms.length*0.8)setShowConfetti(true);
        setTimeout(()=>setMsub(true),500);
      }
      return n});
    setMs(s=>({...s,[term]:def}));
    if(!wasRevealed&&!matchWrong[term]){setSc(s=>s+1)}
    if(wasRevealed){setMatchWrong(mw=>({...mw,[term]:true}))}
  };
  const finishQ=()=>{const total=qt==="match"?qd.correct.length:qd.length;if(sc>=total*0.8)setShowConfetti(true);if(qt==="match"){setMsub(true)}else{setQi(qd.length)}};

  const at=tests.find(t=>t.id===activeId);
  const upcoming=tests.filter(t=>{const d=daysTo(t.date);return d===null||d>=0});
  const past=tests.filter(t=>{const d=daysTo(t.date);return d!==null&&d<0});

  /* ═══════════ QUIZ ═══════════ */
  if(view==="quiz"&&qd){
    const si=at?getSub(at.topic+" "+at.subject):{};
    const total=qt==="match"?qd.correct.length:qd.length;
    const done=qt==="match"?msub:qi>=total;
    const showing=qt!=="match"&&qi<total;
    const pct=qt!=="match"?((qi+(ans?1:0))/total*100):0;

    return<div className="fade-up" style={{paddingBottom:40}}>
      {showConfetti&&<Confetti/>}
      {/* Nav */}
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
        <button onClick={()=>{go("home");setQt(null);setShowConfetti(false)}} style={{width:40,height:40,borderRadius:10,background:"var(--bg-2)",display:"flex",alignItems:"center",justifyContent:"center"}}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-2)" strokeWidth="2.5" strokeLinecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>
        <div style={{flex:1}}>
          <div style={{fontSize:16,fontWeight:700}}>{at?.topic||"Quiz"}</div>
          <div style={{fontSize:12,color:"var(--text-2)",fontWeight:600}}>
            {qt==="mc"?"Multiple Choice":qt==="tf"?"True or False":qt==="fill"?"Fill in the Blank":"Matching"}
          </div>
        </div>
        {!done&&qt!=="match"&&<Pill color={si.accent||"var(--blue)"}>{qi+1} / {total}</Pill>}
      </div>

      {/* Progress */}
      {qt!=="match"&&<div style={{height:5,background:"var(--bg-2)",borderRadius:4,marginBottom:24,overflow:"hidden"}}><div style={{height:"100%",borderRadius:4,background:`linear-gradient(90deg,${si.accent||"var(--blue)"},var(--purple))`,width:pct+"%",transition:"width .4s cubic-bezier(.4,0,.2,1)"}}/></div>}

      {/* ── DONE ── */}
      {done&&<div className="pop-in" style={{textAlign:"center",padding:"24px 16px"}}>
        <div style={{fontSize:56,marginBottom:8}}>{sc>=total*0.8?"🌟":sc>=total*0.5?"💪":"📖"}</div>
        <div style={{animation:"count-up .5s ease both",fontSize:40,fontWeight:800,background:`linear-gradient(135deg,${si.accent||"var(--amber)"},var(--purple))`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:4}}>{sc}/{total}</div>
        <div style={{fontSize:12,color:"var(--text-2)",marginBottom:4,fontWeight:600}}>correct on first try</div>
        <div style={{fontSize:15,color:"var(--text-1)",marginBottom:28,fontWeight:500}}>
          {sc>=total*0.8?"Amazing job, Omar!":sc>=total*0.5?"Great effort! A few more to review.":"Keep practicing — you've got this!"}
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"center"}}>
          <button onClick={()=>{setShowConfetti(false);startQ(activeId,qt)}} style={{padding:"12px 24px",background:si.accent+"18",border:"1.5px solid "+si.accent+"40",borderRadius:12,color:si.accent,fontSize:14,fontWeight:700}}>Try Again</button>
          <button onClick={()=>{go("home");setQt(null);setShowConfetti(false)}} style={{padding:"12px 24px",background:"var(--bg-2)",border:"1.5px solid rgba(0,0,0,0.08)",borderRadius:12,color:"var(--text-1)",fontSize:14,fontWeight:700}}>Done</button>
        </div>
      </div>}

      {/* ── MC ── */}
      {qt==="mc"&&showing&&<div key={qi} className="fade-up">
        <div style={{background:si.accent+"0d",border:"1.5px solid "+si.accent+"25",borderRadius:20,padding:"24px 20px",marginBottom:18,textAlign:"center"}}>
          <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:2,color:si.accent,opacity:0.7,marginBottom:8}}>Define</div>
          <div style={{fontSize:22,fontWeight:800,letterSpacing:"-0.3px"}}>{qd[qi].term}</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {qd[qi].opts.map((o,i)=>{
            const isWrong=wrongPicks.includes(i);
            const isCorrectAndFound=gotItRight&&o.c;
            let bg="var(--bg-2)",bdr="rgba(0,0,0,0.06)";
            if(isCorrectAndFound){bg="var(--green-dim)";bdr="var(--green-mid)"}
            else if(isWrong){bg="var(--red-dim)";bdr="var(--red-mid)"}
            return<button key={i} disabled={isWrong||gotItRight} onClick={()=>{
              if(isWrong||gotItRight)return;
              if(o.c){setGotItRight(true);setAns(true);if(wrongPicks.length===0)setSc(s=>s+1)}
              else{setWrongPicks(wp=>[...wp,i])}
            }} style={{padding:"14px 16px",background:bg,border:"1.5px solid "+bdr,borderRadius:12,color:isWrong?"var(--text-3)":"var(--text-0)",fontSize:14,textAlign:"left",lineHeight:1.45,fontWeight:500,transition:"all .15s",minHeight:48,opacity:isWrong?0.6:1}}>
              {isCorrectAndFound&&<span style={{marginRight:6}}>✅</span>}{isWrong&&<span style={{marginRight:6}}>❌</span>}{o.t}
            </button>})}
        </div>
        {wrongPicks.length>0&&!gotItRight&&<div style={{textAlign:"center",marginTop:10,fontSize:13,color:"var(--amber)",fontWeight:600}}>Not quite — try again!</div>}
        {gotItRight&&wrongPicks.length===0&&<div style={{textAlign:"center",marginTop:10,fontSize:13,color:"var(--green)",fontWeight:600}}>✅ First try — amazing!</div>}
        {gotItRight&&wrongPicks.length>0&&<div style={{textAlign:"center",marginTop:10,fontSize:13,color:"var(--green)",fontWeight:600}}>✅ Got it!</div>}
        {gotItRight&&qi<total-1&&<button onClick={nxtQ} style={{width:"100%",padding:"14px",marginTop:12,background:si.accent+"18",border:"1.5px solid "+si.accent+"35",borderRadius:12,color:si.accent,fontSize:15,fontWeight:700}}>Next →</button>}
        {gotItRight&&qi===total-1&&<button onClick={finishQ} style={{width:"100%",padding:"14px",marginTop:12,background:"var(--green-dim)",border:"1.5px solid var(--green-mid)",borderRadius:12,color:"var(--green)",fontSize:15,fontWeight:700}}>See Results</button>}
      </div>}

      {/* ── TF ── */}
      {qt==="tf"&&showing&&<div key={qi} className="fade-up">
        <div style={{background:si.accent+"0d",border:"1.5px solid "+si.accent+"25",borderRadius:18,padding:"22px 20px",marginBottom:12,textAlign:"center"}}>
          <div style={{fontSize:13,color:si.accent,fontWeight:600,marginBottom:8}}>Is this the correct definition of</div>
          <div style={{fontSize:20,fontWeight:800,marginBottom:14}}>{qd[qi].term}?</div>
          <div style={{fontSize:14,color:"var(--text-1)",lineHeight:1.5,fontStyle:"italic",padding:"12px 16px",background:"rgba(0,0,0,0.05)",borderRadius:10}}>"{qd[qi].shown}"</div>
        </div>
        {gotItRight&&wrongPicks.length===0&&<div style={{textAlign:"center",padding:8,fontSize:14,fontWeight:600,color:"var(--green)"}}>✅ First try!</div>}
        {gotItRight&&wrongPicks.length>0&&<div style={{textAlign:"center",padding:8,fontSize:14,fontWeight:600,color:"var(--green)"}}>✅ Got it!</div>}
        {wrongPicks.length>0&&!gotItRight&&<div style={{textAlign:"center",padding:8,fontSize:14,fontWeight:600,color:"var(--amber)"}}>Not quite — try the other one!</div>}
        <div style={{display:"flex",gap:10}}>
          {[true,false].map(v=>{
            const isWrong=wrongPicks.includes(v?"t":"f");
            const isCorrectAndFound=gotItRight&&v===qd[qi].c;
            let bg="var(--bg-2)",bdr="rgba(0,0,0,0.06)";
            if(isCorrectAndFound){bg="var(--green-dim)";bdr="var(--green-mid)"}
            else if(isWrong){bg="var(--red-dim)";bdr="var(--red-mid)"}
            return<button key={""+v} disabled={isWrong||gotItRight} onClick={()=>{
              if(isWrong||gotItRight)return;
              if(v===qd[qi].c){setGotItRight(true);setAns(true);if(wrongPicks.length===0)setSc(s=>s+1)}
              else{setWrongPicks(wp=>[...wp,v?"t":"f"])}
            }} style={{flex:1,padding:"18px",background:bg,border:"1.5px solid "+bdr,borderRadius:14,color:isWrong?"var(--text-3)":"var(--text-0)",fontSize:17,fontWeight:700,minHeight:56,opacity:isWrong?0.6:1}}>
              {v?"👍 True":"👎 False"}</button>})}
        </div>
        {gotItRight&&qi<total-1&&<button onClick={nxtQ} style={{width:"100%",padding:"14px",marginTop:16,background:si.accent+"18",border:"1.5px solid "+si.accent+"35",borderRadius:12,color:si.accent,fontSize:15,fontWeight:700}}>Next →</button>}
        {gotItRight&&qi===total-1&&<button onClick={finishQ} style={{width:"100%",padding:"14px",marginTop:16,background:"var(--green-dim)",border:"1.5px solid var(--green-mid)",borderRadius:12,color:"var(--green)",fontSize:15,fontWeight:700}}>See Results</button>}
      </div>}

      {/* ── FILL ── */}
      {qt==="fill"&&showing&&<div key={qi} className="fade-up">
        <div style={{background:si.accent+"0d",border:"1.5px solid "+si.accent+"25",borderRadius:18,padding:"22px 20px",marginBottom:18}}>
          <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:2,color:si.accent,opacity:0.7,marginBottom:8}}>Name this term</div>
          <div style={{fontSize:15,color:"var(--text-0)",lineHeight:1.55,fontWeight:500}}>{qd[qi].def}</div>
        </div>
        {fillWrong&&!gotItRight&&<div style={{padding:"10px 14px",marginBottom:10,borderRadius:10,background:"var(--red-dim)",border:"1.5px solid var(--red-mid)",fontSize:13,fontWeight:600,color:"var(--red)"}}>❌ Not quite — try again! <span style={{color:"var(--text-3)",fontWeight:500,fontSize:12}}>Hint: starts with "{qd[qi].term[0].toUpperCase()}"</span></div>}
        {gotItRight&&<div style={{padding:"10px 14px",marginBottom:10,borderRadius:10,background:"var(--green-dim)",border:"1.5px solid var(--green-mid)",fontSize:13,fontWeight:600,color:"var(--green)"}}>✅ {wrongPicks.length===0?"First try — amazing!":"Got it!"} The answer is: <strong style={{color:"var(--text-0)"}}>{qd[qi].term}</strong></div>}
        {!gotItRight&&<>
          <input ref={fiRef} value={fi} onChange={e=>setFi(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&fi.trim())chkFill()}} placeholder="Type your answer..." style={{marginBottom:10,fontSize:16}} autoFocus />
          <button onClick={chkFill} disabled={!fi.trim()} style={{width:"100%",padding:"14px",background:fi.trim()?si.accent+"18":"var(--bg-2)",border:"1.5px solid "+(fi.trim()?si.accent+"35":"rgba(0,0,0,0.06)"),borderRadius:12,color:fi.trim()?si.accent:"var(--text-3)",fontSize:15,fontWeight:700}}>Check</button>
          {wrongPicks.length>=2&&<button onClick={()=>{setGotItRight(true);setAns(true)}} style={{width:"100%",padding:"10px",marginTop:8,background:"transparent",border:"none",color:"var(--text-3)",fontSize:12,fontWeight:600,textDecoration:"underline"}}>Show answer</button>}
        </>}
        {gotItRight&&qi<total-1&&<button onClick={nxtQ} style={{width:"100%",padding:"14px",marginTop:4,background:si.accent+"18",border:"1.5px solid "+si.accent+"35",borderRadius:12,color:si.accent,fontSize:15,fontWeight:700}}>Next →</button>}
        {gotItRight&&qi===total-1&&<button onClick={finishQ} style={{width:"100%",padding:"14px",marginTop:4,background:"var(--green-dim)",border:"1.5px solid var(--green-mid)",borderRadius:12,color:"var(--green)",fontSize:15,fontWeight:700}}>See Results</button>}
      </div>}

      {/* ── MATCH ── */}
      {qt==="match"&&!done&&<div className="fade-up">
        <div style={{fontSize:13,color:"var(--text-2)",marginBottom:16,fontWeight:500}}>Match each term — you'll know right away!</div>
        {qd.terms.map((term,i)=>{
          const isLocked=matchCorrect[term];
          const isWrongFlash=matchWrong[term];
          const correctDef=qd.correct.find(c=>c.term===term)?.def;

          const handleSelect=(val)=>{
            if(!val||isLocked)return;
            if(val===correctDef){
              lockInMatch(term,val,false);
            }else{
              setMatchWrong(mw=>({...mw,[term]:true}));
              setMs(s=>({...s,[term]:""}));
            }
          };

          const showAnswer=()=>{
            lockInMatch(term,correctDef,true);
          };

          return<div key={i} style={{marginBottom:14,transition:"all .2s"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
              {isLocked&&!isWrongFlash&&<span style={{fontSize:16}}>✅</span>}
              {isLocked&&isWrongFlash&&<span style={{fontSize:16}}>💡</span>}
              {isWrongFlash&&!isLocked&&<span style={{fontSize:16}}>❌</span>}
              <span style={{fontSize:15,fontWeight:700,color:isLocked?"var(--green)":isWrongFlash?"var(--red)":si.accent}}>{term}</span>
            </div>
            {isLocked?
              <div style={{padding:"12px 14px",background:isWrongFlash?"var(--amber-dim)":"var(--green-dim)",border:"1.5px solid "+(isWrongFlash?"var(--amber-mid)":"var(--green-mid)"),borderRadius:10,fontSize:13,color:"var(--text-1)",fontWeight:500}}>{matchCorrect[term]}</div>
            :<>
              <select value={ms[term]||""} onChange={e=>handleSelect(e.target.value)} style={{fontSize:14,borderColor:isWrongFlash?"var(--red-mid)":"rgba(0,0,0,0.08)"}}>
                <option value="">{isWrongFlash?"Try again or show answer...":"Choose..."}</option>
                {qd.defs.filter(d=>!Object.values(matchCorrect).includes(d)).map((d,j)=><option key={j} value={d}>{d.length>55?d.slice(0,52)+"...":d}</option>)}
              </select>
              {isWrongFlash&&<button onClick={showAnswer} style={{marginTop:6,padding:"8px 14px",background:"var(--amber-dim)",border:"1.5px solid var(--amber-mid)",borderRadius:8,color:"var(--amber)",fontSize:12,fontWeight:700,width:"100%"}}>💡 Show correct answer</button>}
            </>
            }
          </div>})}
        {Object.keys(matchCorrect).length>0&&Object.keys(matchCorrect).length<qd.terms.length&&
          <div style={{textAlign:"center",marginTop:8,fontSize:12,color:"var(--text-3)",fontWeight:600}}>
            {Object.keys(matchCorrect).length} of {qd.terms.length} matched
          </div>
        }
      </div>}
    </div>
  }

  /* ═══════════ EDIT GUIDE ═══════════ */
  if(view==="edit"&&at){
    const si=getSub(at.topic+" "+at.subject);const g=at.studyGuide||[];
    return<div className="fade-up">
      <BackBtn onClick={()=>{go("detail",activeId);setEi(null)}} label="Back to test"/>
      <div style={{marginBottom:20}}>
        <div style={{fontSize:18,fontWeight:800}}>{at.topic}</div>
        <div style={{fontSize:13,color:"var(--text-2)",fontWeight:600,marginTop:2}}>{si.emoji} {g.length} term{g.length!==1?"s":""}</div>
      </div>

      {g.map((item,i)=>{
        if(ei===i)return<div key={i} className="fade-in" style={{background:"var(--blue-dim)",border:"1.5px solid var(--blue-mid)",borderRadius:14,padding:16,marginBottom:8}}>
          <input value={et} onChange={e=>setEt(e.target.value)} placeholder="Term" style={{marginBottom:8}} />
          <textarea value={ed} onChange={e=>setEd(e.target.value)} placeholder="Definition" rows={2} />
          <div style={{display:"flex",gap:8,marginTop:10}}>
            <button onClick={()=>updG(i)} style={{padding:"8px 18px",background:"var(--green-dim)",border:"1.5px solid var(--green-mid)",borderRadius:8,color:"var(--green)",fontSize:13,fontWeight:700}}>Save</button>
            <button onClick={()=>setEi(null)} style={{padding:"8px 18px",background:"var(--bg-2)",border:"1.5px solid rgba(0,0,0,0.08)",borderRadius:8,color:"var(--text-2)",fontSize:13,fontWeight:600}}>Cancel</button>
          </div>
        </div>;
        return<div key={i} style={{background:"var(--bg-2)",borderRadius:12,padding:"12px 14px",marginBottom:6,display:"flex",alignItems:"flex-start",gap:10}}>
          <div style={{flex:1}}>
            <div style={{fontSize:14,fontWeight:700,color:si.accent}}>{item.term}</div>
            <div style={{fontSize:13,color:"var(--text-2)",marginTop:3,lineHeight:1.45}}>{item.def}</div>
          </div>
          <div style={{display:"flex",gap:4,flexShrink:0,marginTop:2}}>
            <button onClick={()=>{setEi(i);setEt(item.term);setEd(item.def)}} style={{width:32,height:32,borderRadius:8,background:"var(--bg-3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>✏️</button>
            <button onClick={()=>delG(i)} style={{width:32,height:32,borderRadius:8,background:"var(--bg-3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>🗑️</button>
          </div>
        </div>})}

      <div style={{background:"var(--green-dim)",border:"1.5px dashed var(--green-mid)",borderRadius:14,padding:16,marginTop:16}}>
        <div style={{fontSize:13,fontWeight:700,color:"var(--green)",marginBottom:10}}>+ New Term</div>
        <input value={nt} onChange={e=>setNt(e.target.value)} placeholder="Term" style={{marginBottom:8}} />
        <textarea value={nd} onChange={e=>setNd(e.target.value)} placeholder="Definition" rows={2} />
        <button onClick={addG} disabled={!nt.trim()||!nd.trim()} style={{marginTop:10,padding:"10px 22px",background:(nt.trim()&&nd.trim())?"var(--green-dim)":"var(--bg-2)",border:"1.5px solid "+((nt.trim()&&nd.trim())?"var(--green-mid)":"rgba(0,0,0,0.06)"),borderRadius:10,color:(nt.trim()&&nd.trim())?"var(--green)":"var(--text-3)",fontSize:14,fontWeight:700}}>Add</button>
      </div>
    </div>
  }

  /* ═══════════ TEST DETAIL ═══════════ */
  if(view==="detail"&&at){
    const si=getSub(at.topic+" "+at.subject);const g=at.studyGuide||[];const days=daysTo(at.date);const hasG=g.length>0;
    return<div className="fade-up">
      <BackBtn onClick={()=>go("home")} label="All tests"/>
      <div style={{background:si.gradient,border:"1.5px solid "+si.border,borderRadius:18,padding:"20px 18px",marginBottom:20,position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:12,right:14}}><Badge days={days}/></div>
        <Pill color={si.accent} style={{marginBottom:10}}>{si.tag}</Pill>
        <div style={{fontSize:20,fontWeight:800,marginBottom:4,maxWidth:"70%"}}>{at.topic}</div>
        <div style={{fontSize:13,color:"var(--text-2)",fontWeight:500}}>{si.emoji} {si.label} · {fDate(at.date)}</div>
        {at.notes&&<div style={{fontSize:13,color:"var(--text-1)",marginTop:12,lineHeight:1.5,padding:"10px 12px",background:"rgba(0,0,0,0.05)",borderRadius:10}}>📌 {at.notes}</div>}
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:4,marginBottom:16,background:"var(--bg-1)",borderRadius:12,padding:4}}>
        {[{k:"guide",l:"📖 Study Guide"},{k:"quiz",l:"🧠 Quiz Me"}].map(tab=>
          <button key={tab.k} onClick={()=>setDetailTab(tab.k)} style={{flex:1,padding:"10px 8px",borderRadius:10,background:detailTab===tab.k?"var(--bg-3)":"transparent",color:detailTab===tab.k?"var(--text-0)":"var(--text-2)",fontSize:13,fontWeight:600,transition:"all .2s"}}>{tab.l}</button>
        )}
      </div>

      {detailTab==="guide"&&<div className="fade-in">
        {hasG?<>
          {g.map((item,i)=><div key={i} style={{background:"var(--bg-2)",borderRadius:12,padding:"12px 14px",marginBottom:6,borderLeft:"3px solid "+si.accent}}>
            <div style={{fontSize:14,fontWeight:700,color:si.accent}}>{item.term}</div>
            <div style={{fontSize:13,color:"var(--text-2)",marginTop:3,lineHeight:1.45}}>{item.def}</div>
          </div>)}
        </>:<div style={{textAlign:"center",padding:"24px 16px",color:"var(--text-3)"}}>
          <div style={{fontSize:28,marginBottom:8}}>📝</div>
          <div style={{fontWeight:600,marginBottom:4}}>No study material yet</div>
          <div style={{fontSize:13}}>Add terms and definitions to start quizzing</div>
        </div>}
        <button onClick={()=>{go("edit",at.id);setNt("");setNd("");setEi(null)}} style={{width:"100%",padding:"14px",marginTop:12,background:"var(--green-dim)",border:"1.5px solid var(--green-mid)",borderRadius:12,color:"var(--green)",fontSize:14,fontWeight:700}}>✏️ {hasG?"Edit":"Add"} Study Material</button>
      </div>}

      {detailTab==="quiz"&&<div className="fade-in">
        {hasG&&g.length>=2?<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {[{t:"mc",l:"Multiple Choice",i:"🔘",d:"Pick the right answer"},{t:"tf",l:"True / False",i:"✅",d:"Is the definition correct?"},{t:"fill",l:"Fill in Blank",i:"✍️",d:"Type from memory"},{t:"match",l:"Matching",i:"🔗",d:"Connect terms & definitions"}].map(q=>
            <button key={q.t} onClick={()=>startQ(at.id,q.t)} style={{padding:"18px 12px",background:si.accent+"0a",border:"1.5px solid "+si.accent+"22",borderRadius:14,textAlign:"center",transition:"all .15s"}}>
              <div style={{fontSize:24,marginBottom:6}}>{q.i}</div>
              <div style={{fontSize:13,fontWeight:700,color:"var(--text-0)",marginBottom:2}}>{q.l}</div>
              <div style={{fontSize:11,color:"var(--text-3)",fontWeight:500}}>{q.d}</div>
            </button>)}
        </div>:<div style={{textAlign:"center",padding:"24px 16px",color:"var(--text-3)"}}>
          <div style={{fontSize:28,marginBottom:8}}>🧠</div>
          <div style={{fontWeight:600}}>Need at least 2 terms to quiz</div>
          <div style={{fontSize:13,marginTop:4}}>Add study material first</div>
        </div>}
      </div>}

      <button onClick={()=>delTest(at.id)} style={{width:"100%",padding:"12px",marginTop:24,background:"transparent",border:"1.5px solid var(--red-dim)",borderRadius:12,color:"var(--text-3)",fontSize:13,fontWeight:600}}>Remove Test</button>
    </div>
  }

  /* ═══════════ ADD TEST ═══════════ */
  if(view==="add")return<div className="fade-up">
    <BackBtn onClick={()=>go("home")}/>
    <h2 style={{fontSize:20,fontWeight:800,marginBottom:20}}>Add Test</h2>
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div><label style={{fontSize:12,color:"var(--text-2)",fontWeight:700,display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>Subject</label>
        <select value={form.subject} onChange={e=>setForm(p=>({...p,subject:e.target.value}))}><option value="">Select...</option>{SUBJECTS.map(s=><option key={s.label} value={s.label}>{s.emoji} {s.label}</option>)}</select></div>
      <div><label style={{fontSize:12,color:"var(--text-2)",fontWeight:700,display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>Topic</label>
        <input value={form.topic} onChange={e=>setForm(p=>({...p,topic:e.target.value}))} placeholder="e.g. Fractions & Decimals"/></div>
      <div><label style={{fontSize:12,color:"var(--text-2)",fontWeight:700,display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>Test Date</label>
        <input type="date" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))}/></div>
      <div><label style={{fontSize:12,color:"var(--text-2)",fontWeight:700,display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>Notes</label>
        <textarea value={form.notes} onChange={e=>setForm(p=>({...p,notes:e.target.value}))} placeholder="What to review..." rows={3}/></div>
      <button onClick={addTest} disabled={!form.topic.trim()} style={{padding:"16px",marginTop:4,background:form.topic.trim()?"var(--green-dim)":"var(--bg-2)",border:"1.5px solid "+(form.topic.trim()?"var(--green-mid)":"rgba(0,0,0,0.06)"),borderRadius:14,color:form.topic.trim()?"var(--green)":"var(--text-3)",fontSize:16,fontWeight:700}}>Add Test</button>
    </div>
  </div>;

  /* ═══════════ PASTE ═══════════ */
  if(view==="paste")return<div className="fade-up">
    <BackBtn onClick={()=>{go("home");setEmail("")}}/>
    <h2 style={{fontSize:20,fontWeight:800,marginBottom:8}}>Extract from Email</h2>
    <p style={{fontSize:13,color:"var(--text-2)",marginBottom:16,lineHeight:1.5}}>Paste a teacher email or study guide. AI will pull out tests and vocab.</p>
    <textarea value={email} onChange={e=>setEmail(e.target.value)} placeholder="Paste content here..." rows={8} style={{border:"1.5px solid var(--purple-mid)",lineHeight:1.6}}/>
    <button onClick={extract} disabled={extracting||email.trim().length<20} style={{width:"100%",padding:"16px",marginTop:12,background:email.trim().length>=20?"var(--purple-dim)":"var(--bg-2)",border:"1.5px solid "+(email.trim().length>=20?"var(--purple-mid)":"rgba(0,0,0,0.06)"),borderRadius:14,color:email.trim().length>=20?"var(--purple)":"var(--text-3)",fontSize:16,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
      {extracting?<><Spinner color="var(--purple)"/> Extracting...</>:"Extract Tests"}
    </button>
  </div>;

  /* ═══════════ HOME ═══════════ */
  return<div>
    {/* Header */}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24}}>
      <div style={{display:"flex",alignItems:"center",gap:14}}>
        <div style={{width:50,height:50,borderRadius:16,background:"linear-gradient(135deg,#d4af37,#b8860b)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,fontWeight:800,color:"#fff",boxShadow:"0 2px 10px rgba(184,134,11,0.25)",letterSpacing:"-1px"}}>O</div>
        <div>
          <h1 style={{fontSize:20,fontWeight:800,letterSpacing:"-0.3px",lineHeight:1.2}}>Omar's Learning Center</h1>
          <p style={{fontSize:12,color:"var(--text-2)",fontWeight:600,marginTop:1}}>3rd Grade · Cedar Hill Prep</p>
        </div>
      </div>
      <button onClick={()=>setShowHelp(!showHelp)} style={{width:36,height:36,borderRadius:10,background:"var(--bg-2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,color:"var(--text-2)"}}>?</button>
    </div>

    {/* Help */}
    {showHelp&&<div className="fade-up" style={{background:"var(--blue-dim)",border:"1.5px solid var(--blue-mid)",borderRadius:16,padding:18,marginBottom:20,fontSize:13,lineHeight:1.7,color:"var(--text-1)"}}>
      <div style={{fontWeight:800,color:"var(--blue)",marginBottom:8,fontSize:15}}>How It Works</div>
      <div style={{marginBottom:6}}><strong>📸 Photo a study guide</strong> → Send to Mom/Dad in Claude → Learning Center gets updated</div>
      <div style={{marginBottom:6}}><strong>+ Add Test</strong> → Manually add with subject, topic, date</div>
      <div style={{marginBottom:6}}><strong>📧 Paste Email</strong> → Paste teacher email, AI extracts test info</div>
      <div style={{marginBottom:6}}><strong>✏️ Study Material</strong> → Add vocab terms and definitions</div>
      <div style={{marginBottom:6}}><strong>🧠 Quiz Me</strong> → 4 quiz types to practice</div>
      <div><strong>📋 Study Plan</strong> → AI-generated day-by-day study schedule</div>
      <button onClick={()=>setShowHelp(false)} style={{marginTop:10,padding:"6px 14px",background:"var(--bg-2)",borderRadius:8,color:"var(--text-2)",fontSize:12,fontWeight:600}}>Got it</button>
    </div>}

    {/* Actions */}
    <div style={{display:"flex",gap:8,marginBottom:24}}>
      <button onClick={()=>go("add")} style={{flex:1,padding:"14px 12px",background:"var(--blue-dim)",border:"1.5px solid var(--blue-mid)",borderRadius:14,color:"var(--blue)",fontSize:14,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:6,minHeight:48}}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 5v14M5 12h14"/></svg> Add Test
      </button>
      <button onClick={()=>go("paste")} style={{flex:1,padding:"14px 12px",background:"var(--purple-dim)",border:"1.5px solid var(--purple-mid)",borderRadius:14,color:"var(--purple)",fontSize:14,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:6,minHeight:48}}>
        📧 Paste Email
      </button>
    </div>

    {/* Tests */}
    {upcoming.length>0&&<>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <h2 style={{fontSize:11,fontWeight:800,textTransform:"uppercase",letterSpacing:2,color:"var(--text-3)"}}>Upcoming · {upcoming.length}</h2>
      </div>
      {upcoming.map((t,idx)=>{const si=getSub(t.topic+" "+t.subject);const days=daysTo(t.date);const hasG=t.studyGuide?.length>0;
        return<button key={t.id} onClick={()=>{setActiveId(t.id);setDetailTab("guide");go("detail",t.id)}} className="fade-up" style={{animationDelay:idx*50+"ms",width:"100%",background:si.gradient,border:"1.5px solid "+si.border,borderRadius:16,padding:"16px 14px",marginBottom:8,textAlign:"left",display:"flex",alignItems:"center",gap:14,transition:"transform .15s",position:"relative",overflow:"hidden"}}>
          {days!==null&&days>=0&&days<=2&&<div style={{position:"absolute",top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${urgC(days)},transparent)`}}/>}
          <div style={{width:44,height:44,borderRadius:12,background:si.accent+"15",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{si.emoji}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:15,fontWeight:700,marginBottom:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{t.topic}</div>
            <div style={{fontSize:12,color:"var(--text-2)",fontWeight:500,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
              <span>{fDate(t.date)}</span>
              {hasG&&<Pill color={si.accent}>{t.studyGuide.length} terms</Pill>}
            </div>
          </div>
          <Badge days={days}/>
        </button>})}
    </>}

    {upcoming.length===0&&<div style={{background:"var(--bg-2)",borderRadius:18,padding:"36px 24px",textAlign:"center",marginBottom:20}}>
      <div style={{fontSize:36,marginBottom:10}}>🎉</div>
      <div style={{fontWeight:700,fontSize:16,marginBottom:4}}>No upcoming tests</div>
      <div style={{fontSize:13,color:"var(--text-3)"}}>Add one with the buttons above</div>
    </div>}

    {/* Study Plan */}
    {upcoming.length>0&&<button onClick={genPlan} disabled={planLoading} style={{width:"100%",padding:"16px",marginTop:4,marginBottom:20,background:planLoading?"var(--green-dim)":"var(--green-dim)",border:"1.5px solid var(--green-mid)",borderRadius:14,color:"var(--green)",fontSize:15,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:8,minHeight:52}}>
      {planLoading?<><Spinner color="var(--green)"/> Generating...</>:<>{plan?"🔄 Regenerate":"📋 Generate"} Study Plan</>}
    </button>}

    {plan&&Array.isArray(plan)&&<div className="fade-up">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <h2 style={{fontSize:11,fontWeight:800,textTransform:"uppercase",letterSpacing:2,color:"var(--text-3)"}}>Study Plan</h2>
        <button onClick={()=>{setPlan(null);localStorage.removeItem(PK)}} style={{padding:"4px 10px",borderRadius:8,background:"var(--bg-2)",color:"var(--text-3)",fontSize:11,fontWeight:600}}>Clear</button>
      </div>
      {plan.map((day,di)=><div key={di} style={{background:"var(--bg-2)",borderRadius:14,padding:14,marginBottom:8}}>
        <div style={{fontSize:13,fontWeight:700,color:"var(--blue)",marginBottom:8}}>{day.dayLabel||fDate(day.day)}</div>
        {(day.tasks||[]).map((task,ti)=>{const tsi=getSub(task.subject);return<div key={ti} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderTop:ti?"1px solid rgba(0,0,0,0.04)":"none"}}>
          <span style={{fontSize:16,width:28,textAlign:"center"}}>{tsi.emoji}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:600}}>{task.activity}</div>
            <div style={{fontSize:11,color:"var(--text-3)",fontWeight:500,marginTop:2}}>{task.duration} · {task.subject}</div>
          </div>
        </div>})}
      </div>)}
    </div>}

    {/* Past */}
    {past.length>0&&<div style={{marginTop:24}}>
      <h2 style={{fontSize:11,fontWeight:800,textTransform:"uppercase",letterSpacing:2,color:"var(--text-3)",marginBottom:10}}>Past · {past.length}</h2>
      {past.map(t=>{const si=getSub(t.topic+" "+t.subject);return<div key={t.id} style={{background:"var(--bg-1)",borderRadius:12,padding:"10px 14px",marginBottom:4,opacity:0.5,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}><span>{si.emoji}</span><span style={{fontSize:13,fontWeight:600}}>{t.topic}</span></div>
        <button onClick={()=>delTest(t.id)} style={{width:28,height:28,borderRadius:8,background:"var(--bg-2)",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--text-3)",fontSize:14}}>×</button>
      </div>})}
    </div>}

    <div style={{textAlign:"center",marginTop:32,fontSize:11,color:"var(--text-3)",fontWeight:500}}>
      Built with care · {BUILD_VERSION} · {BUILD_DATE}
    </div>
    <div style={{textAlign:"center",marginTop:8,fontSize:10,color:"var(--text-3)",opacity:0.5}}>
      Pull down to refresh for updates
    </div>
  </div>;
}

function PullWrapper({children}){
  const{pulling,pullDist,refreshing,threshold}=usePullToRefresh();
  const ready=pullDist>=threshold*0.5;
  return<div id="ptr-container" style={{transform:pulling?`translateY(${pullDist}px)`:"translateY(0)",transition:pulling?"none":"transform .3s cubic-bezier(.4,0,.2,1)"}}>
    <div id="ptr-indicator" className={(pulling||refreshing?"visible":"")+(refreshing?" refreshing":"")+(ready&&!refreshing?" ready":"")} style={{transform:`translateX(-50%) translateY(${pulling?0:-20}px)`,opacity:pulling||refreshing?Math.min(pullDist/30,1):0}}>
      {refreshing
        ?<div className="ptr-spinner"/>
        :<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--amber)" strokeWidth="2.5" strokeLinecap="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
      }
    </div>
    {children}
  </div>
}

ReactDOM.createRoot(document.getElementById("root")).render(<PullWrapper><App/></PullWrapper>);
</script>
</body>
</html>
