<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omar's Learning Center</title>
  <!-- Icons & PWA -->
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <link rel="apple-touch-icon" href="icon-512.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Omar">
  <meta name="theme-color" content="#0a1628">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --slate-950: #020617;
      --slate-900: #0f172a;
      --slate-800: #1e293b;
      --slate-700: #334155;
      --slate-600: #475569;
      --slate-400: #94a3b8;
      --slate-200: #e2e8f0;
      --gold-300: #fcd34d;
      --gold-400: #fbbf24;
      --gold-500: #f59e0b;
      --gold-600: #d97706;
      --green:    #4ade80;
      --red:      #f87171;
      --bg:       #0f172a;
      --surface:  #1e293b;
      --surface2: #334155;
      --text:     #f1f5f9;
      --muted:    #94a3b8;
      --border:   rgba(251,191,36,.14);
      --r:        12px;
      --r-sm:     8px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'DM Sans',sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      background-image:
        radial-gradient(ellipse 60% 50% at 15% 0%,rgba(251,191,36,.07) 0%,transparent 100%),
        radial-gradient(ellipse 50% 40% at 85% 100%,rgba(251,191,36,.05) 0%,transparent 100%);
    }

    /* ─── HEADER ─── */
    .hdr{
      position:sticky;top:0;z-index:200;
      background:var(--slate-950);
      border-bottom:1px solid var(--border);
      height:62px;
      display:flex;align-items:center;justify-content:space-between;
      padding:0 24px;
    }
    .brand{display:flex;align-items:center;gap:10px;cursor:pointer}
    .brand-icon{
      height:36px;padding:0 10px;border-radius:7px;
      background:linear-gradient(135deg,#0a1628 0%,#0f2044 100%);
      border:1.5px solid var(--gold-600);
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;
      box-shadow:0 2px 8px rgba(0,0,0,.4), inset 0 1px 0 rgba(251,191,36,.15);
    }
    .brand-icon-text{
      font-family:'Playfair Display',serif;
      font-size:14px;font-weight:700;letter-spacing:.18em;
      background:linear-gradient(135deg,var(--gold-300),var(--gold-500));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
    }
    .brand-name{font-family:'Playfair Display',serif;font-size:17px;font-weight:700}
    .brand-name em{color:var(--gold-400);font-style:normal}
    .nav{display:flex;gap:4px}
    .nav-btn{
      padding:6px 14px;border-radius:6px;border:none;
      background:transparent;color:var(--muted);
      cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13.5px;font-weight:500;
      transition:all .18s;
    }
    .nav-btn:hover,.nav-btn.active{background:var(--surface);color:var(--text)}

    /* ─── MAIN ─── */
    .main{max-width:1080px;margin:0 auto;padding:36px 24px}

    /* ─── BUTTONS ─── */
    .btn{
      display:inline-flex;align-items:center;gap:7px;
      padding:10px 20px;border-radius:var(--r-sm);border:none;
      cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;
      transition:all .18s;
    }
    .btn-primary{background:var(--gold-500);color:var(--slate-900);font-weight:600}
    .btn-primary:hover{background:var(--gold-400);transform:translateY(-1px);box-shadow:0 4px 14px rgba(245,158,11,.28)}
    .btn-primary:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
    .btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--surface2)}
    .btn-secondary:hover{border-color:rgba(251,191,36,.4);color:var(--gold-400)}
    .btn-ghost{background:transparent;color:var(--muted)}
    .btn-ghost:hover{color:var(--text);background:var(--surface)}
    .btn-danger{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.2)}
    .btn-danger:hover{background:rgba(248,113,113,.2)}
    .btn-sm{padding:7px 14px;font-size:13px}

    /* ─── BACK ─── */
    .back{
      display:inline-flex;align-items:center;gap:7px;
      color:var(--muted);cursor:pointer;font-size:13.5px;
      border:none;background:transparent;font-family:'DM Sans',sans-serif;
      margin-bottom:24px;padding:4px 0;transition:color .18s;
    }
    .back:hover{color:var(--gold-400)}

    /* ─── FORMS ─── */
    .form-wrap{max-width:620px;margin:0 auto}
    .form-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;margin-bottom:6px}
    .form-sub{color:var(--muted);font-size:14px;margin-bottom:30px}
    .fg{margin-bottom:20px}
    label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
    input[type=text],input[type=date],select,textarea{
      width:100%;padding:11px 15px;
      background:var(--slate-950);border:1px solid var(--surface2);border-radius:var(--r-sm);
      color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;
      outline:none;transition:border-color .18s;
    }
    input:focus,select:focus,textarea:focus{
      border-color:var(--gold-500);
      box-shadow:0 0 0 3px rgba(245,158,11,.1);
    }
    input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.65)}
    select option{background:var(--slate-900)}

    /* ─── STEPS ─── */
    .steps{display:flex;align-items:center;margin-bottom:32px}
    .step{display:flex;align-items:center;gap:8px}
    .step-n{
      width:27px;height:27px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:13px;font-weight:700;
      border:2px solid var(--surface2);color:var(--muted);
    }
    .step.active .step-n{background:var(--gold-500);border-color:var(--gold-500);color:var(--slate-900)}
    .step.done .step-n{background:rgba(251,191,36,.12);border-color:var(--gold-500);color:var(--gold-400)}
    .step-lbl{font-size:13px;font-weight:500;color:var(--muted)}
    .step.active .step-lbl{color:var(--text)}
    .step-line{flex:1;height:1px;background:var(--surface2);margin:0 14px}

    /* ─── TERM ROWS ─── */
    .terms-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
    .term-row{
      display:grid;grid-template-columns:22px 1fr 1fr auto;
      gap:10px;align-items:center;
      background:var(--slate-950);padding:10px 12px;
      border-radius:var(--r-sm);border:1px solid var(--surface2);
    }
    .term-row input{margin:0;padding:9px 12px;font-size:14px}
    .term-num{font-size:11px;font-weight:700;color:var(--gold-500);text-align:center}
    .add-term-row{
      display:flex;gap:10px;align-items:center;
      padding:12px;border-radius:var(--r-sm);
      border:2px dashed rgba(251,191,36,.2);
      background:rgba(251,191,36,.02);
      margin-bottom:24px;
    }
    .add-term-inputs{display:grid;grid-template-columns:1fr 1fr;gap:10px;flex:1}
    .add-term-inputs input{margin:0;font-size:14px;padding:9px 12px}

    /* ─── DASHBOARD ─── */
    .dash-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:32px}
    .dash-title{font-family:'Playfair Display',serif;font-size:34px;font-weight:700}
    .dash-title em{color:var(--gold-400);font-style:normal}
    .dash-sub{color:var(--muted);font-size:14px;margin-top:5px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(295px,1fr));gap:18px}

    /* ─── TEST CARD ─── */
    .tcard{
      background:var(--surface);border:1px solid var(--border);
      border-radius:var(--r);padding:20px;cursor:pointer;
      transition:all .2s;position:relative;overflow:hidden;
    }
    .tcard::before{
      content:'';position:absolute;top:0;left:0;right:0;height:3px;
      background:linear-gradient(90deg,var(--gold-600),var(--gold-400));
    }
    .tcard:hover{border-color:rgba(251,191,36,.32);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.28)}
    .tcard-sub{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--gold-500);margin-bottom:8px}
    .tcard-name{font-family:'Playfair Display',serif;font-size:19px;font-weight:600;margin-bottom:13px;line-height:1.3}
    .tcard-meta{display:flex;gap:14px;margin-bottom:14px}
    .meta{display:flex;align-items:center;gap:5px;font-size:12.5px;color:var(--muted)}
    .badge{
      display:inline-flex;align-items:center;gap:5px;
      padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500;
    }
    .badge-up{background:rgba(245,158,11,.12);color:var(--gold-400);border:1px solid rgba(245,158,11,.2)}
    .badge-soon{background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.2)}
    .badge-past{background:var(--surface2);color:var(--muted)}

    .add-card{
      border:2px dashed rgba(251,191,36,.22);background:rgba(251,191,36,.025);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:10px;min-height:155px;cursor:pointer;transition:all .2s;border-radius:var(--r);
    }
    .add-card:hover{border-color:rgba(251,191,36,.45);background:rgba(251,191,36,.055)}
    .add-icon{
      width:46px;height:46px;border-radius:50%;
      background:rgba(251,191,36,.1);
      display:flex;align-items:center;justify-content:center;
      font-size:22px;color:var(--gold-400);font-weight:300;
    }

    /* ─── EMPTY STATE ─── */
    .empty{text-align:center;padding:72px 24px}
    .empty-ico{font-size:60px;margin-bottom:18px}
    .empty-title{font-family:'Playfair Display',serif;font-size:26px;margin-bottom:8px}
    .empty-desc{color:var(--muted);margin-bottom:24px}

    /* ─── DETAIL ─── */
    .detail-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;gap:16px}
    .detail-sub{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--gold-500);margin-bottom:8px}
    .detail-title{font-family:'Playfair Display',serif;font-size:34px;font-weight:700;line-height:1.2;margin-bottom:10px}
    .detail-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}

    .stats-bar{
      display:flex;gap:0;
      background:var(--slate-950);border:1px solid var(--border);
      border-radius:var(--r-sm);overflow:hidden;margin-bottom:28px;
    }
    .stat{flex:1;text-align:center;padding:16px 12px;border-right:1px solid var(--border)}
    .stat:last-child{border-right:none}
    .stat-v{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--gold-400)}
    .stat-l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}

    /* ─── QUIZ MODES ─── */
    .modes{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:28px}
    .mode{
      background:var(--surface);border:1px solid var(--border);
      border-radius:var(--r);padding:20px;cursor:pointer;text-align:center;
      transition:all .18s;
    }
    .mode:hover{border-color:rgba(251,191,36,.38);background:rgba(251,191,36,.045);transform:translateY(-1px)}
    .mode-ico{font-size:30px;margin-bottom:9px}
    .mode-name{font-weight:600;font-size:15px;margin-bottom:3px}
    .mode-desc{font-size:12px;color:var(--muted)}

    /* ─── TERMS DISPLAY ─── */
    .sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .sec-title{font-size:15px;font-weight:600}
    .terms-display{display:flex;flex-direction:column;gap:7px}
    .term-item{display:grid;grid-template-columns:1fr 1.4fr;border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--surface2)}
    .tw{padding:12px 15px;background:var(--slate-950);font-weight:500;font-size:14px}
    .td{padding:12px 15px;background:var(--surface);font-size:14px;color:var(--muted)}
    .divider{height:1px;background:var(--surface2);margin:28px 0}

    /* ─── QUIZ ─── */
    .quiz-wrap{max-width:620px;margin:0 auto}
    .qprog{margin-bottom:28px}
    .qprog-info{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:8px}
    .pbar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
    .pfill{height:100%;background:linear-gradient(90deg,var(--gold-600),var(--gold-400));border-radius:3px;transition:width .4s ease}
    .q-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .q-mode{font-size:13px;font-weight:600;color:var(--gold-400)}
    .q-test{font-size:13px;color:var(--muted)}
    .q-card{
      font-family:'Playfair Display',serif;font-size:23px;font-weight:600;
      text-align:center;line-height:1.4;
      padding:26px 24px;
      background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
      margin-bottom:24px;
    }
    .q-hint{font-size:14px;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:400;margin-bottom:12px}

    /* MC options */
    .opts{display:flex;flex-direction:column;gap:10px}
    .opt{
      display:flex;align-items:center;gap:12px;
      padding:14px 18px;
      background:var(--surface);border:1px solid var(--surface2);border-radius:var(--r-sm);
      cursor:pointer;text-align:left;width:100%;
      font-family:'DM Sans',sans-serif;font-size:14.5px;color:var(--text);
      transition:all .14s;
    }
    .opt:hover:not(:disabled){border-color:rgba(251,191,36,.38);background:rgba(251,191,36,.05)}
    .opt.correct{border-color:var(--green);background:rgba(74,222,128,.1);color:var(--green)}
    .opt.wrong{border-color:var(--red);background:rgba(248,113,113,.1);color:var(--red)}
    .opt-ltr{
      width:27px;height:27px;border-radius:6px;
      background:var(--surface2);
      display:flex;align-items:center;justify-content:center;
      font-size:12px;font-weight:700;flex-shrink:0;
    }
    /* TF */
    .tf-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .tf-btn{
      padding:22px;font-size:19px;font-weight:700;
      border-radius:var(--r);border:2px solid var(--surface2);
      background:var(--surface);color:var(--text);cursor:pointer;
      font-family:'DM Sans',sans-serif;transition:all .14s;
    }
    .tf-btn:hover:not(:disabled){border-color:var(--gold-500)}
    .tf-btn.correct{border-color:var(--green);background:rgba(74,222,128,.1);color:var(--green)}
    .tf-btn.wrong{border-color:var(--red);background:rgba(248,113,113,.1);color:var(--red)}
    /* Fill */
    .fill-area{display:flex;flex-direction:column;gap:12px}
    .fill-area input{font-size:16px;padding:14px 16px}
    .fill-feedback{
      padding:16px 18px;border-radius:var(--r-sm);font-size:16px;font-weight:600;
      border:1px solid;display:flex;align-items:center;gap:10px;
    }
    .q-feedback{
      margin-top:20px;padding:18px 20px;border-radius:var(--r);
      display:flex;align-items:center;justify-content:space-between;gap:16px;
      border:2px solid;
    }
    .q-feedback.ok{background:rgba(74,222,128,.1);border-color:rgba(74,222,128,.35);color:var(--green)}
    .q-feedback.no{background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.35);color:var(--red)}
    .q-feedback-left{display:flex;align-items:center;gap:12px}
    .q-feedback-ico{font-size:36px;line-height:1}
    .q-feedback-word{font-family:'Playfair Display',serif;font-size:22px;font-weight:700}
    .q-feedback-msg{font-size:13.5px;margin-top:3px;opacity:.85}
    .btn-next{
      padding:12px 24px;border-radius:var(--r-sm);border:none;
      background:var(--gold-500);color:var(--slate-900);
      font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;
      cursor:pointer;white-space:nowrap;flex-shrink:0;
      transition:background .15s,transform .15s;
    }
    .btn-next:hover{background:var(--gold-400);transform:translateY(-1px)}
    .fill-feedback.ok{background:rgba(74,222,128,.1);color:var(--green);border-color:rgba(74,222,128,.3)}
    .fill-feedback.no{background:rgba(248,113,113,.1);color:var(--red);border-color:rgba(248,113,113,.3)}

    /* Matching */
    .match-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .match-col{display:flex;flex-direction:column;gap:8px}
    .match-item{
      padding:12px 15px;border-radius:var(--r-sm);border:1px solid var(--surface2);
      cursor:pointer;font-size:13.5px;transition:all .14s;background:var(--surface);
      user-select:none;
    }
    .match-item:hover:not(.matched){border-color:rgba(251,191,36,.3)}
    .match-item.sel{border-color:var(--gold-500);background:rgba(251,191,36,.1);color:var(--gold-400)}
    .match-item.matched{border-color:var(--green);background:rgba(74,222,128,.08);color:var(--green);cursor:default}
    .match-item.shake{animation:shake .28s ease}
    @keyframes shake{0%,100%{transform:translateX(0)}30%{transform:translateX(-5px)}70%{transform:translateX(5px)}}
    .match-complete{
      text-align:center;padding:40px 24px;
      background:var(--surface);border:1px solid rgba(74,222,128,.2);
      border-radius:var(--r);
    }

    /* ─── RESULTS ─── */
    .results{text-align:center;max-width:480px;margin:0 auto;padding:40px 20px}
    .result-ring{
      width:118px;height:118px;border-radius:50%;border:4px solid var(--gold-500);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      margin:0 auto 24px;background:rgba(251,191,36,.07);
    }
    .result-pct{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;color:var(--gold-400);line-height:1}
    .result-lbl{font-size:11px;color:var(--muted)}
    .result-title{font-family:'Playfair Display',serif;font-size:28px;margin-bottom:6px}
    .breakdown{display:flex;gap:24px;justify-content:center;margin:20px 0 28px}
    .bd-item{text-align:center}
    .bd-num{font-size:26px;font-weight:700}
    .bd-lbl{font-size:12px;color:var(--muted)}
    .c-green{color:var(--green)}.c-red{color:var(--red)}
    .missed-box{
      background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
      padding:16px 20px;text-align:left;margin-bottom:24px;
    }
    .missed-label{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em}
    .missed-term{font-size:14px;color:var(--red);padding:3px 0}

    /* ─── STUDY PLAN ─── */
    .plan-wrap{max-width:620px}
    .plan-tip{
      background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.18);
      border-radius:var(--r-sm);padding:14px 18px;margin-bottom:20px;font-size:13.5px;
    }
    .plan-tip strong{color:var(--gold-400)}
    .session{
      display:flex;align-items:flex-start;gap:16px;padding:16px 18px;
      background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);
      margin-bottom:10px;transition:border-color .18s;
    }
    .session.today{border-color:rgba(251,191,36,.38);background:rgba(251,191,36,.04)}
    .s-date{text-align:center;min-width:56px}
    .s-day{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--gold-400);line-height:1}
    .s-dow{font-size:11px;color:var(--muted);text-transform:uppercase}
    .s-today{font-size:10px;color:var(--gold-500);font-weight:600;margin-top:3px}
    .s-info{flex:1}
    .s-focus{font-size:15px;font-weight:600;margin-bottom:3px}
    .s-desc{font-size:13px;color:var(--muted)}
    .s-dur{
      padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;
      background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.2);color:var(--gold-400);
      white-space:nowrap;align-self:flex-start;
    }

    /* ─── TOAST ─── */
    .toast{
      position:fixed;bottom:24px;right:24px;z-index:9999;
      padding:13px 20px;background:var(--surface);border:1px solid var(--border);
      border-radius:var(--r-sm);font-size:14px;box-shadow:0 8px 32px rgba(0,0,0,.4);
      opacity:0;transform:translateY(8px);transition:all .28s;pointer-events:none;
    }
    .toast.show{opacity:1;transform:translateY(0)}

    /* ─── UTIL ─── */
    .hidden{display:none!important}
    .loading{text-align:center;padding:60px;color:var(--muted)}
    .cols2{display:grid;grid-template-columns:1fr 1fr;gap:16px}

    /* ─── PULL TO REFRESH ─── */
    #ptr{
      position:fixed;top:62px;left:0;right:0;z-index:150;
      display:flex;align-items:center;justify-content:center;
      height:0;overflow:hidden;
      background:linear-gradient(180deg,rgba(251,191,36,.08) 0%,transparent 100%);
      transition:height .22s ease;
      pointer-events:none;
    }
    #ptr.pulling{height:56px}
    #ptr.refreshing{height:56px}
    .ptr-inner{display:flex;align-items:center;gap:10px;color:var(--gold-400);font-size:13px;font-weight:600}
    .ptr-arrow{
      width:28px;height:28px;border-radius:50%;
      background:rgba(251,191,36,.12);border:1.5px solid rgba(251,191,36,.3);
      display:flex;align-items:center;justify-content:center;
      transition:transform .22s ease;
    }
    #ptr.ready .ptr-arrow{transform:rotate(180deg)}
    .ptr-spinner{
      width:18px;height:18px;
      border:2.5px solid rgba(251,191,36,.25);
      border-top-color:var(--gold-400);
      border-radius:50%;
      animation:spin .65s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ─── FOOTER ─── */
    .ftr{
      margin-top:60px;
      border-top:1px solid var(--border);
      padding:18px 24px;
      text-align:center;
      font-size:11.5px;
      color:var(--slate-600);
      letter-spacing:.04em;
    }
    .ftr strong{color:var(--slate-400);font-weight:600}
  </style>
</head>
<body>

<div class="hdr">
  <div class="brand" onclick="nav('home')">
    <div class="brand-icon"><span class="brand-icon-text">OMAR</span></div>
    <div class="brand-name">Omar's <em>Learning Center</em></div>
  </div>
  <div class="nav">
    <button class="nav-btn" id="nb-home" onclick="nav('home')">My Tests</button>
    <button class="nav-btn" id="nb-add"  onclick="startAdd()">+ Add Test</button>
  </div>
</div>

<div id="ptr"><div class="ptr-inner"><div class="ptr-arrow" id="ptr-arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg></div><span id="ptr-label">Pull down to refresh</span></div></div>
<div class="main" id="app"><div class="loading">Loading…</div></div>
<div class="toast" id="toast"></div>
<div class="ftr" id="ftr"></div>

<script>
// ──────────────────────────────────────────────
// STATE
// ──────────────────────────────────────────────
const S = {
  view: 'home',
  tests: [],
  cur: null,          // current test id

  // add flow
  addStep: 1,
  newTest: reset_newTest(),

  // edit
  editTest: null,

  // quiz
  mode: null,
  qs: [],
  qi: 0,
  score: 0,
  answers: [],

  // matching
  mLeft: [], mRight: [], mPairs: [], mSel: null,
};

function reset_newTest(){ return {name:'', subject:'Math', date:'', terms:[]} }

const SUBJECTS = ['Math','Science','Reading','Social Studies','Spelling','Other'];
const EMOJI = {Math:'🔢',Science:'🔬',Reading:'📖','Social Studies':'🌍',Spelling:'✏️',Other:'📝'};
const DAYS  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

// ──────────────────────────────────────────────
// STORAGE
// ──────────────────────────────────────────────
async function loadTests(){
  try{
    const r = await window.storage.get('lc2:tests:v3');
    const parsed = JSON.parse(r.value);
    if(Array.isArray(parsed)) S.tests = parsed;
  } catch(e){
    // Don't wipe existing tests on storage error — keep whatever is in memory
    if(!S.tests) S.tests = [];
  }
}
async function saveTests(){
  try{ await window.storage.set('lc2:tests:v3', JSON.stringify(S.tests)); }
  catch(e){ console.error(e); }
}
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);

// ──────────────────────────────────────────────
// NAV
// ──────────────────────────────────────────────
function nav(view, extra={}){
  S.view = view;
  Object.assign(S, extra);
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(view==='home') document.getElementById('nb-home').classList.add('active');
  if(view==='addTest') document.getElementById('nb-add').classList.add('active');
  render();
}
function startAdd(){
  S.addStep = 1;
  S.newTest = reset_newTest();
  nav('addTest');
}

// ──────────────────────────────────────────────
// RENDER ROUTER
// ──────────────────────────────────────────────
function render(){
  const app = document.getElementById('app');
  switch(S.view){
    case 'home':       app.innerHTML = rHome(); break;
    case 'addTest':    app.innerHTML = rAdd(); break;
    case 'detail':     app.innerHTML = rDetail(); break;
    case 'editTest':   app.innerHTML = rEdit(); break;
    case 'quiz':       app.innerHTML = rQuiz(); break;
    case 'results':    app.innerHTML = rResults(); break;
    case 'studyPlan':  app.innerHTML = rPlan(); break;
  }
}

// ──────────────────────────────────────────────
// HOME
// ──────────────────────────────────────────────
function rHome(){
  const tests = S.tests;
  const soon  = tests.filter(t=>t.date && daysUntil(t.date)>=0 && daysUntil(t.date)<=3).length;

  let h = `<div class="dash-head">
    <div>
      <div class="dash-title">Hey, <em>Omar!</em> 🌟</div>
      <div class="dash-sub">${tests.length} test set${tests.length!==1?'s':''} saved${soon?` · ${soon} coming up soon`:''}</div>
    </div>
  </div>`;

  if(!tests.length){
    return h + `<div class="empty">
      <div class="empty-ico">📚</div>
      <div class="empty-title">No tests yet!</div>
      <div class="empty-desc">Add your first study set to get started.</div>
      <button class="btn btn-primary" onclick="startAdd()">+ Add My First Test</button>
    </div>`;
  }

  h += `<div class="grid">`;
  const sorted = [...tests].sort((a,b)=>{
    if(!a.date) return 1; if(!b.date) return -1;
    return new Date(a.date)-new Date(b.date);
  });
  for(const t of sorted){
    const d = t.date ? daysUntil(t.date) : null;
    let badge = '';
    if(d!==null){
      if(d<0)          badge=`<span class="badge badge-past">📅 Past</span>`;
      else if(d<=2)    badge=`<span class="badge badge-soon">⚠️ ${d===0?'Today!':d===1?'Tomorrow!':'In 2 days!'}</span>`;
      else             badge=`<span class="badge badge-up">📅 In ${d} days</span>`;
    }
    h += `<div class="tcard" onclick="nav('detail',{cur:'${t.id}'})">
      <div class="tcard-sub">${EMOJI[t.subject]||'📝'} ${t.subject}</div>
      <div class="tcard-name">${x(t.name)}</div>
      <div class="tcard-meta"><span class="meta">📋 ${t.terms.length} term${t.terms.length!==1?'s':''}</span></div>
      ${badge}
    </div>`;
  }
  h += `<div class="add-card" onclick="startAdd()">
    <div class="add-icon">+</div>
    <div style="font-size:14px;color:var(--muted);font-weight:500;">Add new test</div>
  </div></div>`;
  return h;
}

function daysUntil(s){
  const t=new Date(); t.setHours(0,0,0,0);
  const d=new Date(s+'T00:00:00');
  return Math.round((d-t)/86400000);
}

// ──────────────────────────────────────────────
// ADD TEST
// ──────────────────────────────────────────────
function rAdd(){
  if(S.addStep===1){
    const t=S.newTest;
    return `<button class="back" onclick="nav('home')">← Back</button>
    <div class="form-wrap">
      <div class="form-title">Add New Test</div>
      <div class="form-sub">Tell us about the test first</div>
      <div class="steps">
        <div class="step active"><div class="step-n">1</div><div class="step-lbl">Test Info</div></div>
        <div class="step-line"></div>
        <div class="step"><div class="step-n">2</div><div class="step-lbl">Add Terms</div></div>
      </div>
      <div class="fg"><label>Test Name</label>
        <input type="text" id="n-name" value="${x(t.name)}" placeholder="e.g. Chapter 5 Vocabulary" oninput="S.newTest.name=this.value"></div>
      <div class="cols2">
        <div class="fg"><label>Subject</label>
          <select onchange="S.newTest.subject=this.value">
            ${SUBJECTS.map(s=>`<option value="${s}" ${s===t.subject?'selected':''}>${EMOJI[s]} ${s}</option>`).join('')}
          </select></div>
        <div class="fg"><label>Test Date (optional)</label>
          <input type="date" value="${t.date}" onchange="S.newTest.date=this.value"></div>
      </div>
      <button class="btn btn-primary" onclick="goStep2()">Next: Add Terms →</button>
    </div>`;
  }

  // Step 2
  const t=S.newTest;
  return `<button class="back" onclick="S.addStep=1;render()">← Back</button>
  <div class="form-wrap">
    <div class="form-title">${x(t.name)}</div>
    <div class="form-sub">Add all the terms you need to study</div>
    <div class="steps">
      <div class="step done"><div class="step-n">✓</div><div class="step-lbl">Test Info</div></div>
      <div class="step-line"></div>
      <div class="step active"><div class="step-n">2</div><div class="step-lbl">Add Terms</div></div>
    </div>
    <div class="sec-head"><div class="sec-title">Terms (${t.terms.length})</div></div>
    <div class="terms-list">${t.terms.map((tm,i)=>termRow(tm,i,'new')).join('')}</div>
    <div class="add-term-row">
      <div class="add-term-inputs">
        <input type="text" id="nt" placeholder="Term" onkeydown="if(event.key==='Enter')document.getElementById('nd').focus()">
        <input type="text" id="nd" placeholder="Definition" onkeydown="if(event.key==='Enter')addTerm('new')">
      </div>
      <button class="btn btn-primary btn-sm" onclick="addTerm('new')">+ Add</button>
    </div>
    <div style="display:flex;gap:12px;align-items:center;">
      <button class="btn btn-primary" onclick="saveNew()" ${t.terms.length<2?'disabled':''}>
        Save Test ${t.terms.length>0?'('+t.terms.length+' terms)':''}
      </button>
      <button class="btn btn-secondary" onclick="nav('home')">Cancel</button>
    </div>
    ${t.terms.length<2?'<p style="color:var(--muted);font-size:13px;margin-top:12px;">Add at least 2 terms to save.</p>':''}
  </div>`;
}

function termRow(tm, i, mode){
  const mObj = mode==='new'?'S.newTest':'S.editTest';
  return `<div class="term-row">
    <span class="term-num">${i+1}</span>
    <input type="text" value="${x(tm.term)}" placeholder="Term"
      oninput="${mObj}.terms[${i}].term=this.value">
    <input type="text" value="${x(tm.definition)}" placeholder="Definition"
      oninput="${mObj}.terms[${i}].definition=this.value">
    <button class="btn btn-ghost btn-sm" onclick="removeTerm(${i},'${mode}')" style="padding:6px 10px">✕</button>
  </div>`;
}

function goStep2(){
  if(!S.newTest.name.trim()){ toast('Enter a test name!'); return; }
  S.addStep=2; render();
  setTimeout(()=>document.getElementById('nt')?.focus(),50);
}

function addTerm(mode){
  const termEl=document.getElementById('nt');
  const defEl =document.getElementById('nd');
  const term=(termEl?.value||'').trim();
  const def =(defEl?.value||'').trim();
  if(!term||!def){ toast('Fill in both term and definition!'); return; }
  const obj={id:uid(),term,definition:def};
  if(mode==='new') S.newTest.terms.push(obj);
  else             S.editTest.terms.push(obj);
  render();
  setTimeout(()=>document.getElementById('nt')?.focus(),50);
}

function removeTerm(i,mode){
  if(mode==='new') S.newTest.terms.splice(i,1);
  else             S.editTest.terms.splice(i,1);
  render();
}

async function saveNew(){
  const t=S.newTest;
  if(t.terms.length<2) return;
  const test={id:uid(),name:t.name,subject:t.subject,date:t.date,terms:t.terms,createdAt:new Date().toISOString()};
  S.tests.push(test);
  await saveTests();
  toast('✅ Test saved!');
  S.newTest=reset_newTest(); S.addStep=1;
  nav('detail',{cur:test.id});
}

// ──────────────────────────────────────────────
// DETAIL
// ──────────────────────────────────────────────
function rDetail(){
  const t=S.tests.find(t=>t.id===S.cur);
  if(!t) return '<p>Not found</p>';
  const d=t.date?daysUntil(t.date):null;
  let dateStr='';
  if(d!==null){
    if(d<0) dateStr=`Test was ${Math.abs(d)} day${Math.abs(d)!==1?'s':''} ago`;
    else if(d===0) dateStr='⚠️ Test is TODAY!';
    else if(d===1) dateStr='⚠️ Test is TOMORROW!';
    else dateStr=`📅 Test in ${d} days`;
  }
  const urgentColor=d!==null&&d<=1?'var(--red)':'var(--muted)';

  return `<button class="back" onclick="nav('home')">← All Tests</button>
  <div class="detail-head">
    <div>
      <div class="detail-sub">${EMOJI[t.subject]||'📝'} ${t.subject}</div>
      <div class="detail-title">${x(t.name)}</div>
      ${dateStr?`<div style="font-size:14px;color:${urgentColor};">${dateStr}</div>`:''}
      <div class="detail-actions">
        <button class="btn btn-secondary btn-sm" onclick="nav('editTest')">✏️ Edit Terms</button>
        <button class="btn btn-secondary btn-sm" onclick="nav('studyPlan')">📅 Study Plan</button>
        <button class="btn btn-danger btn-sm" onclick="deleteTest('${t.id}')">🗑 Delete</button>
      </div>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat"><div class="stat-v">${t.terms.length}</div><div class="stat-l">Terms</div></div>
    ${t.date?`<div class="stat"><div class="stat-v">${Math.max(0,d??0)}</div><div class="stat-l">Days Left</div></div>`:''}
    <div class="stat"><div class="stat-v">4</div><div class="stat-l">Quiz Modes</div></div>
  </div>

  <div class="sec-head"><div class="sec-title">Choose a Quiz Mode</div></div>
  <div class="modes">
    <div class="mode" onclick="startQuiz('mc')">
      <div class="mode-ico">🎯</div><div class="mode-name">Multiple Choice</div>
      <div class="mode-desc">Pick the right answer from 4 options</div>
    </div>
    <div class="mode" onclick="startQuiz('tf')">
      <div class="mode-ico">✅</div><div class="mode-name">True or False</div>
      <div class="mode-desc">Decide if the definition is correct</div>
    </div>
    <div class="mode" onclick="startQuiz('fill')">
      <div class="mode-ico">✍️</div><div class="mode-name">Fill in the Blank</div>
      <div class="mode-desc">Type the definition yourself</div>
    </div>
    <div class="mode" onclick="startQuiz('match')">
      <div class="mode-ico">🔗</div><div class="mode-name">Matching</div>
      <div class="mode-desc">Match each term to its definition</div>
    </div>
  </div>

  <div class="divider"></div>
  <div class="sec-head"><div class="sec-title">All Terms (${t.terms.length})</div></div>
  <div style="display:grid;grid-template-columns:1fr 1.4fr;padding:6px 15px;gap:0;margin-bottom:8px;">
    <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">Term</div>
    <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">Definition</div>
  </div>
  <div class="terms-display">
    ${t.terms.map(tm=>`<div class="term-item"><div class="tw">${x(tm.term)}</div><div class="td">${x(tm.definition)}</div></div>`).join('')}
  </div>`;
}

async function deleteTest(id){
  if(!confirm('Delete this test? This cannot be undone.')) return;
  S.tests=S.tests.filter(t=>t.id!==id);
  await saveTests();
  toast('Test deleted');
  nav('home');
}

// ──────────────────────────────────────────────
// EDIT
// ──────────────────────────────────────────────
function rEdit(){
  const t=S.tests.find(t=>t.id===S.cur);
  if(!t) return '';
  if(!S.editTest||S.editTest.id!==t.id) S.editTest=JSON.parse(JSON.stringify(t));
  const et=S.editTest;

  return `<button class="back" onclick="nav('detail')">← Back to Test</button>
  <div class="form-wrap">
    <div class="form-title">Edit Test</div>
    <div class="form-sub">${x(t.name)}</div>
    <div class="fg"><label>Test Name</label>
      <input type="text" value="${x(et.name)}" oninput="S.editTest.name=this.value"></div>
    <div class="cols2">
      <div class="fg"><label>Subject</label>
        <select onchange="S.editTest.subject=this.value">
          ${SUBJECTS.map(s=>`<option value="${s}" ${s===et.subject?'selected':''}>${EMOJI[s]} ${s}</option>`).join('')}
        </select></div>
      <div class="fg"><label>Test Date</label>
        <input type="date" value="${et.date}" onchange="S.editTest.date=this.value"></div>
    </div>
    <div class="sec-head"><div class="sec-title">Terms (${et.terms.length})</div></div>
    <div class="terms-list">${et.terms.map((tm,i)=>termRow(tm,i,'edit')).join('')}</div>
    <div class="add-term-row">
      <div class="add-term-inputs">
        <input type="text" id="nt" placeholder="Term" onkeydown="if(event.key==='Enter')document.getElementById('nd').focus()">
        <input type="text" id="nd" placeholder="Definition" onkeydown="if(event.key==='Enter')addTerm('edit')">
      </div>
      <button class="btn btn-primary btn-sm" onclick="addTerm('edit')">+ Add</button>
    </div>
    <div style="display:flex;gap:12px;">
      <button class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
      <button class="btn btn-secondary" onclick="nav('detail')">Cancel</button>
    </div>
  </div>`;
}

async function saveEdit(){
  const et=S.editTest;
  if(!et.name.trim()){ toast('Test name is required'); return; }
  if(et.terms.length<2){ toast('Need at least 2 terms'); return; }
  const i=S.tests.findIndex(t=>t.id===et.id);
  if(i>-1){ S.tests[i]={...et}; await saveTests(); toast('✅ Saved!'); S.editTest=null; nav('detail'); }
}

// ──────────────────────────────────────────────
// QUIZ ENGINE
// ──────────────────────────────────────────────
function startQuiz(mode){
  const t=S.tests.find(t=>t.id===S.cur);
  if(!t||t.terms.length<2){ toast('Need at least 2 terms to quiz!'); return; }
  S.mode=mode; S.qi=0; S.score=0; S.answers=[];

  if(mode==='match'){
    const shuf=shuffle([...t.terms]);
    S.mLeft =shuf.map(tm=>({id:tm.id,text:tm.term}));
    S.mRight=shuffle(shuf.map(tm=>({id:tm.id,text:tm.definition})));
    S.mPairs=[]; S.mSel=null;
  } else {
    S.qs=shuffle([...t.terms]).map(tm=>{
      const wrongs=shuffle(t.terms.filter(x=>x.id!==tm.id));
      const opts=shuffle([tm,...wrongs.slice(0,3)]);
      const tfOk=Math.random()>.5;
      const tfDef=tfOk?tm.definition:(wrongs[0]?.definition||tm.definition);
      return {...tm, opts, tfOk, tfDef};
    });
  }
  nav('quiz');
}

function modeLabel(m){
  return {mc:'🎯 Multiple Choice',tf:'✅ True or False',fill:'✍️ Fill in the Blank',match:'🔗 Matching'}[m]||m;
}

function rQuiz(){
  const t=S.tests.find(t=>t.id===S.cur);
  if(!t) return '';

  if(S.mode==='match') return rMatch(t);

  const q=S.qs[S.qi];
  const total=S.qs.length;
  const pct=(S.qi/total)*100;
  const LTRS=['A','B','C','D'];

  let body='';
  if(S.mode==='mc'){
    body=`<div class="q-card">${x(q.term)}</div>
    <div class="opts" id="opts">
      ${q.opts.map((o,i)=>`
        <button class="opt" id="op${i}" onclick="ansMC(${i},'${o.id}','${q.id}')">
          <span class="opt-ltr">${LTRS[i]}</span>${x(o.definition)}
        </button>`).join('')}
    </div>`;
  } else if(S.mode==='tf'){
    body=`<div class="q-card">
      <div class="q-hint">Is this correct?</div>
      <strong>${x(q.term)}</strong>
      <div style="margin-top:13px;font-size:18px;color:var(--muted);">"${x(q.tfDef)}"</div>
    </div>
    <div class="tf-grid" id="tf">
      <button class="tf-btn" id="tf-t" onclick="ansTF(true,${q.tfOk})">✅ True</button>
      <button class="tf-btn" id="tf-f" onclick="ansTF(false,${q.tfOk})">❌ False</button>
    </div>`;
  } else if(S.mode==='fill'){
    // Store correct answer as data attribute to avoid quote-escaping in onclick
    body=`<div class="q-card">
      <div class="q-hint" style="font-size:13px;color:var(--muted);margin-bottom:10px;">What is the word for this definition?</div>
      ${x(q.definition)}
    </div>
    <div class="fill-area" id="fill-area" data-answer="${x(q.term)}">
      <input type="text" id="fill-in" placeholder="Type the word…"
        onkeydown="if(event.key==='Enter')ansFill()">
      <button class="btn btn-primary" onclick="ansFill()">Check Answer</button>
    </div>`;
  }

  return `<button class="back" onclick="nav('detail')">← Exit Quiz</button>
  <div class="quiz-wrap">
    <div class="q-label"><div class="q-mode">${modeLabel(S.mode)}</div><div class="q-test">${x(t.name)}</div></div>
    <div class="qprog">
      <div class="qprog-info"><span>Question ${S.qi+1} of ${total}</span><span>${S.score} correct ⭐</span></div>
      <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
    </div>
    ${body}
  </div>`;
}

function ansMC(idx, selId, corrId){
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  const ok=selId===corrId;
  if(ok) S.score++;
  const selBtn=document.getElementById('op'+idx);
  selBtn.classList.add(ok?'correct':'wrong');
  const selLtr=selBtn.querySelector('.opt-ltr');
  selLtr.innerHTML=ok?'<span style="font-size:18px">✓</span>':'<span style="font-size:18px">✗</span>';
  if(!ok){
    S.qs[S.qi].opts.forEach((o,i)=>{
      if(o.id===corrId){
        const cb=document.getElementById('op'+i);
        cb.classList.add('correct');
        cb.querySelector('.opt-ltr').innerHTML='<span style="font-size:18px">✓</span>';
      }
    });
  }
  S.answers.push({ok, term:S.qs[S.qi].term});
  showFeedback(ok, S.qs[S.qi]);
}

function ansTF(sel, isOk){
  document.querySelectorAll('.tf-btn').forEach(b=>b.disabled=true);
  const ok=sel===isOk;
  if(ok) S.score++;
  const picked=document.getElementById(sel?'tf-t':'tf-f');
  picked.classList.add(ok?'correct':'wrong');
  picked.innerHTML=(ok?'<div style="font-size:36px">✓</div><div>':'<div style="font-size:36px">✗</div><div>')+picked.textContent+'</div>';
  if(!ok){
    const corrBtn=document.getElementById(isOk?'tf-t':'tf-f');
    corrBtn.classList.add('correct');
    corrBtn.innerHTML='<div style="font-size:36px">✓</div><div>'+corrBtn.textContent+'</div>';
  }
  S.answers.push({ok, term:S.qs[S.qi].term});
  showFeedback(ok, S.qs[S.qi]);
}

function ansFill(){
  const inp=document.getElementById('fill-in');
  const correctAnswer=document.getElementById('fill-area').dataset.answer;
  const ans=(inp?.value||'').trim().toLowerCase();
  const ok=ans===correctAnswer.toLowerCase()||sim(ans,correctAnswer.toLowerCase())>.8;
  if(ok) S.score++;
  S.answers.push({ok, term:S.qs[S.qi].term});
  if(inp) inp.disabled=true;
  const checkBtn=document.querySelector('#fill-area .btn');
  if(checkBtn) checkBtn.style.display='none';
  showFeedback(ok, S.qs[S.qi]);
}

function showFeedback(ok, q){
  const wrap=document.querySelector('.quiz-wrap');
  if(!wrap) return;
  const isLast=(S.qi+1>=S.qs.length);
  const nextLabel=isLast?'See My Results →':'Next Question →';
  const wrongMsg=S.mode==='tf'
    ? `The correct answer was <strong>${q.tfOk?'True':'False'}</strong>`
    : S.mode==='fill'
    ? `The word was: <strong>${q.term}</strong>`
    : `The correct answer was: <strong>${q.definition}</strong>`;
  const fb=document.createElement('div');
  fb.className='q-feedback '+(ok?'ok':'no');
  fb.innerHTML=`
    <div class="q-feedback-left">
      <div class="q-feedback-ico">${ok?'✓':'✗'}</div>
      <div>
        <div class="q-feedback-word">${ok?'Correct!':'Wrong!'}</div>
        ${!ok?`<div class="q-feedback-msg">${wrongMsg}</div>`:''}
      </div>
    </div>
    <button class="btn-next" onclick="nextQ()">${nextLabel}</button>`;
  wrap.appendChild(fb);
  fb.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function nextQ(){
  if(S.qi+1>=S.qs.length){ nav('results'); return; }
  S.qi++;
  render();
  if(S.mode==='fill') setTimeout(()=>document.getElementById('fill-in')?.focus(),50);
}

// Matching
function rMatch(t){
  const done=S.mPairs.length===S.mLeft.length;
  if(done){
    return `<button class="back" onclick="nav('detail')">← Back to Test</button>
    <div class="quiz-wrap">
      <div class="match-complete">
        <div style="font-size:56px;margin-bottom:16px;">🎉</div>
        <div style="font-family:'Playfair Display',serif;font-size:26px;font-weight:700;margin-bottom:8px;">All Matched!</div>
        <div style="color:var(--muted);margin-bottom:24px;">You matched all ${S.mLeft.length} terms correctly!</div>
        <div style="display:flex;gap:12px;justify-content:center;">
          <button class="btn btn-primary" onclick="startQuiz('match')">Play Again</button>
          <button class="btn btn-secondary" onclick="nav('detail')">Back to Test</button>
        </div>
      </div>
    </div>`;
  }

  const pct=(S.mPairs.length/S.mLeft.length)*100;
  return `<button class="back" onclick="nav('detail')">← Exit Quiz</button>
  <div class="quiz-wrap">
    <div class="q-label"><div class="q-mode">🔗 Matching</div><div class="q-test">${x(t.name)}</div></div>
    <div class="qprog">
      <div class="qprog-info"><span>${S.mPairs.length} of ${S.mLeft.length} matched</span></div>
      <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
    </div>
    <p style="color:var(--muted);font-size:13px;margin-bottom:14px;">Click a term, then click its matching definition</p>
    <div class="match-grid">
      <div class="match-col">
        ${S.mLeft.map(it=>{
          const m=S.mPairs.includes(it.id);
          const sel=S.mSel===it.id;
          return `<div class="match-item ${m?'matched':sel?'sel':''}" id="ml-${it.id}"
            onclick="${m?'':'selMatch(\'left\',\''+it.id+'\')' }">${x(it.text)}</div>`;
        }).join('')}
      </div>
      <div class="match-col">
        ${S.mRight.map(it=>{
          const m=S.mPairs.includes(it.id);
          return `<div class="match-item ${m?'matched':''}" id="mr-${it.id}"
            onclick="${m?'':'selMatch(\'right\',\''+it.id+'\')' }">${x(it.text)}</div>`;
        }).join('')}
      </div>
    </div>
  </div>`;
}

function selMatch(side, id){
  if(side==='left'){ S.mSel=id; render(); return; }
  if(!S.mSel) return;
  if(S.mSel===id){
    S.mPairs.push(id); S.mSel=null; render();
  } else {
    ['ml-'+S.mSel,'mr-'+id].forEach(eid=>{
      const el=document.getElementById(eid);
      if(el){ el.classList.add('shake'); setTimeout(()=>el.classList.remove('shake'),350); }
    });
    S.mSel=null;
    setTimeout(render,400);
  }
}

function rPlan(){
  const t=S.tests.find(t=>t.id===S.cur);
  if(!t) return '';
  const sessions=genPlan(t);

  return `<button class="back" onclick="nav('detail')">← Back to Test</button>
  <div class="plan-wrap">
    <div class="form-title" style="margin-bottom:6px;">📅 Study Plan</div>
    <div class="form-sub">${x(t.name)} · ${sessions.length} sessions</div>
    <div class="plan-tip">
      <strong>💡 Tip:</strong> Each session is 15–20 min. Take a break between sessions.
      Try a quiz after each one to test yourself!
    </div>
    ${sessions.map((s,i)=>{
      const d=s.date;
      const today=new Date(); today.setHours(0,0,0,0);
      const isToday=d.getTime()===today.getTime();
      return `<div class="session${isToday?' today':''}">
        <div class="s-date">
          <div class="s-day">${d.getDate()}</div>
          <div class="s-dow">${DAYS[d.getDay()]}</div>
          ${isToday?'<div class="s-today">TODAY</div>':''}
        </div>
        <div class="s-info">
          <div class="s-focus">Session ${i+1}: ${s.focus}</div>
          <div class="s-desc">${s.desc}</div>
        </div>
        <div class="s-dur">${s.min} min</div>
      </div>`;
    }).join('')}
    ${!t.date?'<p style="color:var(--muted);font-size:13px;margin-top:16px;">💡 Add a test date for a personalized schedule!</p>':''}
  </div>`;
}

function genPlan(test){
  const today=new Date(); today.setHours(0,0,0,0);
  let days=7;
  if(test.date){
    const td=new Date(test.date+'T00:00:00');
    days=Math.max(1,Math.min(Math.round((td-today)/86400000),7));
  }
  const types=[
    {focus:'First Read',       desc:'Read every term carefully. Say them out loud!',             min:15},
    {focus:'Flashcard Round',  desc:'Cover definitions and try to guess each one.',              min:15},
    {focus:'Write It Out',     desc:'Write each term and definition twice.',                     min:20},
    {focus:'Quiz Yourself',    desc:'Take a Multiple Choice quiz.',                              min:15},
    {focus:'Tricky Terms',     desc:'Focus on the ones you got wrong.',                          min:15},
    {focus:'Speed Round',      desc:'Race through all terms as fast as you can!',               min:10},
    {focus:'Final Review',     desc:'Take all 4 quiz modes for a full check.',                  min:20},
  ];
  const count=Math.min(days,Math.max(3,Math.ceil(test.terms.length/5)));
  return Array.from({length:count},(_,i)=>{
    const d=new Date(today);
    d.setDate(today.getDate()+Math.floor((i/count)*days));
    return {date:d,...types[Math.min(i,types.length-1)]};
  });
}

// ──────────────────────────────────────────────
// UTILS
// ──────────────────────────────────────────────
function shuffle(a){
  const b=[...a];
  for(let i=b.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [b[i],b[j]]=[b[j],b[i]]; }
  return b;
}
function x(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function sim(a,b){
  if(a===b) return 1;
  const L=a.length>b.length?a:b, S=a.length>b.length?b:a;
  if(!L.length) return 1;
  const dp=Array.from({length:S.length+1},(_,i)=>i);
  for(let i=1;i<=L.length;i++){
    let p=dp[0]; dp[0]=i;
    for(let j=1;j<=S.length;j++){
      const t=dp[j];
      dp[j]=L[i-1]===S[j-1]?p:1+Math.min(p,dp[j],dp[j-1]);
      p=t;
    }
  }
  return (L.length-dp[S.length])/L.length;
}
function toast(msg,ms=2600){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),ms);
}

// ──────────────────────────────────────────────
// PULL-TO-REFRESH
// ──────────────────────────────────────────────
function initPTR(){
  let startY=0, curY=0, pulling=false, triggered=false;
  const ptr=document.getElementById('ptr');
  const arrow=document.getElementById('ptr-arrow');
  const label=document.getElementById('ptr-label');
  const THRESHOLD=80;

  document.addEventListener('touchstart',e=>{
    if(window.scrollY>0) return;
    startY=e.touches[0].clientY;
    pulling=true; triggered=false;
  },{passive:true});

  document.addEventListener('touchmove',e=>{
    if(!pulling) return;
    curY=e.touches[0].clientY;
    const dist=Math.min(curY-startY,THRESHOLD*1.4);
    if(dist<=0){ ptr.className=''; return; }
    ptr.classList.add('pulling');
    if(dist>=THRESHOLD){
      ptr.classList.add('ready');
      label.textContent='Release to refresh!';
    } else {
      ptr.classList.remove('ready');
      label.textContent='Pull down to refresh';
    }
  },{passive:true});

  document.addEventListener('touchend',async ()=>{
    if(!pulling) return;
    pulling=false;
    const dist=curY-startY;
    if(dist>=THRESHOLD && !triggered){
      triggered=true;
      ptr.className='refreshing';
      label.textContent='Refreshing…';
      arrow.innerHTML='<div class="ptr-spinner"></div>';
      await loadTests();
      if(S.tests.length === 0){ S.tests = SEED_TESTS; await saveTests(); }
      nav(S.view);
      stampFooter();
      setTimeout(()=>{ ptr.className=''; arrow.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg>'; label.textContent='Pull down to refresh'; },400);
    } else {
      ptr.className='';
    }
    curY=0;
  },{passive:true});
}
